<!--
  Branded "Confirm signup" email for Potluck Photos.

  HOW TO USE: Supabase dashboard -> Authentication -> Emails -> Templates ->
  "Confirm signup" -> paste this HTML into the message body -> Save.
  {{ .ConfirmationURL }} is Supabase's confirmation link variable — leave it as-is.
  If your primary domain isn't www.potluck.photos, update the logo <img> src below.
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#FFF8F2;padding:32px 0;">
  <tr><td align="center">
    <table role="presentation" width="440" cellpadding="0" cellspacing="0" style="width:440px;max-width:92%;background:#ffffff;border-radius:20px;overflow:hidden;font-family:Helvetica,Arial,sans-serif;">
      <tr><td align="center" style="padding:28px 32px 8px;">
        <img src="https://www.potluck.photos/logo.png" alt="Potluck Photos" width="150" style="display:block;width:150px;height:auto;" />
      </td></tr>
      <tr><td align="center" style="padding:8px 32px 0;">
        <h1 style="margin:0;font-size:22px;color:#2B1810;font-weight:700;">Confirm your email</h1>
        <p style="margin:10px 0 0;font-size:15px;color:#8a6f5e;line-height:1.5;">
          Welcome to Potluck Photos! Tap the button below to confirm your account and start collecting photos with your people.
        </p>
      </td></tr>
      <tr><td align="center" style="padding:24px 32px 8px;">
        <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#FF6B6B;color:#ffffff;font-size:15px;font-weight:700;text-decoration:none;padding:13px 28px;border-radius:12px;">
          Confirm my email
        </a>
      </td></tr>
      <tr><td align="center" style="padding:8px 32px 28px;">
        <p style="margin:0;font-size:12px;color:#8a6f5e;line-height:1.5;">
          If the button doesn&rsquo;t work, copy and paste this link:<br />
          <a href="{{ .ConfirmationURL }}" style="color:#FF6B6B;word-break:break-all;">{{ .ConfirmationURL }}</a>
        </p>
        <p style="margin:16px 0 0;font-size:12px;color:#8a6f5e;">Didn&rsquo;t sign up? You can ignore this email.</p>
      </td></tr>
    </table>
  </td></tr>
</table>
